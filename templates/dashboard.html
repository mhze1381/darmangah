
<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>داشبورد</title>
</head>
<body>

<h2>لیست بیماران</h2>


<a href="/add-patient">ثبت بیمار جدید</a>

<br><br>

<table border="1">

<tr>
    <th>نام</th>
    <th>کد ملی</th>
    <th>تلفن</th>
    <th>سن</th>
    <th>جنسیت</th>
</tr>

{% for patient in patients %}

<tr>

<td>{{ patient.full_name }}</td>
<td>{{ patient.national_code }}</td>
<td>{{ patient.phone }}</td>
<td>{{ patient.age }}</td>
<td>{{ patient.gender }}</td>
<td><a href="/edit-patient/{{ patient.id }}">ویرایش</a></td>
<td><a href="/delete-patient/{{ patient.id }}"> حذف</a></td>


</tr>

{% endfor %}

</table>

</body>
</html>
